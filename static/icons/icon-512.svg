<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Outer recurrence ring -->
  <circle cx="256" cy="256" r="165" stroke="white" stroke-opacity="0.12" stroke-width="14" fill="none"/>
  <!-- Circular arrows (recurrence symbol) -->
  <path d="M256 91a165 165 0 0 1 142.9 82.5" stroke="white" stroke-opacity="0.3" stroke-width="14" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M398.9 173.5l-14 30-30-14" stroke="white" stroke-opacity="0.3" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M256 421a165 165 0 0 1-142.9-82.5" stroke="white" stroke-opacity="0.3" stroke-width="14" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M113.1 338.5l14-30 30 14" stroke="white" stroke-opacity="0.3" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dollar sign -->
  <g filter="url(#glow)">
    <path d="M256 165v182" stroke="white" stroke-width="18" fill="none" stroke-linecap="round"/>
    <path d="M203 218c0-30 23-43 53-43s53 13 53 38c0 44-106 35-106 80 0 26 23 43 53 43s53-14 53-43" stroke="white" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
